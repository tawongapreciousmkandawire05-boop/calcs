<!DOCTYPE html>
<html>
    <link rel="stylesheet" href="style.css">
<head></head>
<body>
<input type ="text" id ="calcDisplay" disabled ><br>
<button onClick = "formatPati()">C</button>

<button onClick = "vorTex('6')">6</button>
<button onClick = "vorTex('5')">5</button>
<button onClick = "vorTex('4')">4</button><br>
<button onClick = "vorTex('*')">*</button>
<button onClick = "vorTex('3')">3</button>
<button onClick = "vorTex('2')">2</button>
<button onClick = "vorTex('1')">1</button><br>

<button onClick = "tisoveZimenezi()">=</button><br>

<button onClick = "vorTex('Math.sqrt')">√</button>
<button onClick = "vorTex('Math.sin')">sin</button>
<button onClick = "vorTex('Math.cos')">cos</button><br>
<button onClick = "vorTex('Math.tan')">tan</button>
<button onClick = "vorTex('(')">(</button>
<button onClick = "vorTex(')')">)</button>
<button onClick = "vorTex('**')">xʸ</button><br>
<script>
function vorTex(num){ 
    const vorTexShow = document.getElementById('calcDisplay');
vorTexShow.value += num;
}

function tisoveZimenezi(){
const variabo = document.getElementById('calcDisplay');
variabo.value = eval(variabo.value);

expression = expression.replace(/Math\.sqrt/g, 'Math.sqrt');
expression = expression.replace(/Math\.sin/g, 'Math.sin');
expression = expression.replace(/Math\.cos/g, 'Math.cos');
expression = expression.replace(/Math\.tan/g, 'Math.tan');

try {
    display.value = eval(expression);
} catch (error) {
    display.value = 'Error';

}


}



function formatPati(){
    const variabro = document.getElementById('calcDisplay');
    variabro.value = '';
}
</script>


</body>
